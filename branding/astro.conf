# Astro Browser Branding Configuration
# Change these values to rebrand the browser, then run:
#   tools/apply-branding.sh
#
# This replaces all user-facing "Chromium" strings in .grd resource files
# and updates the BRANDING file used by Chromium's build system.

BROWSER_NAME="Astro"
BROWSER_FULL_NAME="Astro Web Browser"
COMPANY_NAME="Oxy"
COMPANY_FULL_NAME="Oxy"
COMPANY_URL="https://oxy.so"
BROWSER_URL="https://oxy.so/astro"
PACKAGE_NAME="astro-browser"
RDN="so.oxy.Astro"
MAINTAINER_EMAIL="team@oxy.so"
INSTALL_DIR="/opt/oxy/astro"
MAC_CREATOR_CODE="OxAs"

# Theme
THEME_COLOR="#c46ede"
THEME_COLOR_RGB="0xC4, 0x6E, 0xDE"

# Logo source (SVG, used to generate all PNG sizes)
LOGO_SVG="branding/astro-logo.svg"

# URL scheme (displayed instead of chrome://)
URL_SCHEME="astro"

# User Agent identifier (appended after Chrome/)
UA_IDENTIFIER="Astro"

# Default search engine
DEFAULT_SEARCH="duckduckgo"

# Copyright text
COPYRIGHT_TEXT="Made with ❤️ in the 🌎 by Oxy."
