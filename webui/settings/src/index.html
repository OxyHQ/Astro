<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Astro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script>
      (function () {
        const t = localStorage.getItem("astro-theme");
        if (
          t === "dark" ||
          (!t && matchMedia("(prefers-color-scheme:dark)").matches)
        )
          document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body class="bg-oxy-bg text-oxy-text font-sans">
    <div id="app" class="flex h-screen overflow-hidden">
      <!-- Mobile sidebar overlay -->
      <div id="sidebar-overlay" class="sidebar-overlay lg:hidden"></div>

      <!-- Sidebar -->
      <nav
        id="sidebar"
        class="sidebar fixed z-50 flex h-full w-[240px] -translate-x-full flex-col border-r border-oxy-border bg-oxy-surface lg:relative lg:translate-x-0"
      >
        <!-- Logo area -->
        <div class="flex items-center gap-2.5 px-5 pt-5 pb-1">
          <svg
            class="h-5 w-5 shrink-0"
            viewBox="0 0 163 169"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g
              transform="translate(0,169) scale(0.1,-0.1)"
              fill="#c46ede"
              stroke="none"
            >
              <path
                d="M936 1454 c37 -22 114 -116 114 -139 0 -4 22 -44 49 -89 75 -124 89 -148 112 -191 24 -45 87 -153 207 -357 101 -171 120 -228 102 -293 -17 -62 -61 -120 -110 -145 -91 -47 -434 -36 -566 18 -136 55 -246 148 -315 267 -77 132 -94 192 -93 335 1 141 25 223 107 362 30 51 66 114 81 140 67 119 199 158 312 92z"
              />
              <path
                d="M361 586 c108 -45 154 -170 101 -273 -34 -65 -83 -93 -162 -93 -81 0 -124 21 -165 81 -25 37 -30 54 -30 104 0 50 5 67 30 105 52 76 148 109 226 76z"
              />
            </g>
          </svg>
          <div class="flex flex-col">
            <span class="text-[15px] font-semibold text-oxy-text">Settings</span>
          </div>
        </div>

        <!-- Navigation -->
        <div id="nav-list" class="mt-2 flex-1 space-y-px overflow-y-auto px-2.5 pb-4">
          <!-- Navigation items injected by JS -->
        </div>
      </nav>

      <!-- Main content -->
      <main
        id="content"
        class="flex min-w-0 flex-1 flex-col overflow-y-auto"
      >
        <!-- Top bar -->
        <header
          class="sticky top-0 z-30 flex items-center gap-3 bg-oxy-bg/80 px-6 py-3 backdrop-blur-xl lg:px-8"
        >
          <!-- Mobile menu button -->
          <button
            id="menu-btn"
            type="button"
            class="flex h-9 w-9 items-center justify-center rounded-xl text-oxy-text-secondary hover:bg-oxy-surface lg:hidden"
            aria-label="Open menu"
          >
            <svg
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="4" y1="6" x2="20" y2="6" />
              <line x1="4" y1="12" x2="20" y2="12" />
              <line x1="4" y1="18" x2="20" y2="18" />
            </svg>
          </button>

          <!-- Search -->
          <div class="search-box flex max-w-md flex-1 items-center gap-3 px-4 py-2.5">
            <svg
              class="h-4 w-4 shrink-0 text-oxy-text-tertiary"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.3-4.3" />
            </svg>
            <input
              type="text"
              id="search-input"
              class="search-input min-w-0 flex-1 bg-transparent text-sm text-oxy-text"
              placeholder="Search settings..."
              autocomplete="off"
            />
            <kbd
              id="search-hint"
              class="hidden shrink-0 rounded-md border border-oxy-border bg-oxy-bg px-1.5 py-0.5 text-[11px] font-medium text-oxy-text-tertiary sm:inline-block"
              >/</kbd
            >
          </div>

          <div class="flex-1"></div>

          <!-- Theme toggle -->
          <button
            id="theme-toggle"
            type="button"
            class="flex h-9 w-9 items-center justify-center rounded-xl text-oxy-text-secondary transition-colors hover:bg-oxy-surface"
            aria-label="Toggle theme"
          >
            <svg
              id="icon-sun"
              class="hidden h-[18px] w-[18px]"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5" />
              <path
                d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
              />
            </svg>
            <svg
              id="icon-moon"
              class="h-[18px] w-[18px]"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
        </header>

        <!-- Sections container -->
        <div id="sections" class="mx-auto w-full max-w-3xl space-y-6 px-6 py-8 lg:px-10">
          <!-- Sections injected by JS -->
        </div>
      </main>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
