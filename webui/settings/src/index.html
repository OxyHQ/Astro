<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - Astro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="chrome://theme/colors.css?sets=ui,chrome" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-oxy-bg text-oxy-text font-sans">
    <div id="app" class="flex h-screen overflow-hidden">
      <!-- Mobile sidebar overlay -->
      <div id="sidebar-overlay" class="sidebar-overlay lg:hidden"></div>

      <!-- Sidebar -->
      <nav
        id="sidebar"
        class="sidebar fixed z-50 flex h-full w-[220px] -translate-x-full flex-col border-r border-oxy-border bg-oxy-bg lg:relative lg:translate-x-0"
      >
        <!-- Back arrow + Settings heading -->
        <div class="flex items-center gap-2 px-4 pt-4 pb-1">
          <button type="button" class="flex h-6 w-6 items-center justify-center rounded-md text-oxy-text-secondary hover:text-oxy-text hover:bg-oxy-surface" aria-label="Go back">
            <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <span class="text-sm font-semibold text-oxy-text">Settings</span>
        </div>

        <!-- Search trigger (opens command palette) -->
        <div class="px-3 pt-2 pb-2">
          <button id="search-trigger" type="button" class="flex w-full items-center gap-2 rounded-lg bg-black/[0.03] px-2.5 py-1.5 text-left transition-colors hover:bg-black/[0.06] dark:bg-white/[0.05] dark:hover:bg-white/[0.08]">
            <svg class="h-3 w-3 shrink-0 text-oxy-text-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <span class="flex-1 text-[11.5px] text-oxy-text-tertiary">Search...</span>
            <kbd class="rounded border border-oxy-border/50 bg-oxy-bg/60 px-1 py-px text-[9px] font-medium text-oxy-text-tertiary">⌘K</kbd>
          </button>
        </div>

        <!-- Navigation -->
        <div id="nav-list" class="flex-1 space-y-0.5 overflow-y-auto px-2.5 pb-3 scrollbar-none"></div>

      </nav>

      <!-- Main content -->
      <main
        id="content"
        class="flex min-w-0 flex-1 flex-col overflow-y-auto"
      >
        <!-- Mobile-only top bar -->
        <div class="sticky top-0 z-30 flex items-center gap-2 bg-oxy-bg/80 px-4 py-2 backdrop-blur-sm lg:hidden">
          <button
            id="menu-btn"
            type="button"
            class="flex h-7 w-7 items-center justify-center rounded-lg text-oxy-text-secondary hover:bg-oxy-surface"
            aria-label="Open menu"
          >
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="4" y1="6" x2="20" y2="6" /><line x1="4" y1="12" x2="20" y2="12" /><line x1="4" y1="18" x2="20" y2="18" />
            </svg>
          </button>
          <span class="text-sm font-medium text-oxy-text">Settings</span>
        </div>

        <!-- Sections container -->
        <div id="sections" class="mx-auto w-full max-w-[640px] space-y-4 px-6 py-5 lg:px-8">
          <!-- Sections injected by JS -->
        </div>
      </main>
    </div>

    <!-- Command palette (shadcn-style) -->
    <div id="command-overlay" class="fixed inset-0 z-[200] hidden bg-black/50 backdrop-blur-sm" style="display:none">
      <div class="flex items-start justify-center pt-[16vh]">
        <div class="command-dialog w-full max-w-[520px] mx-4 overflow-hidden rounded-xl border border-oxy-border bg-oxy-surface shadow-2xl">
          <div class="flex items-center gap-2.5 border-b border-oxy-border px-4 py-3">
            <svg class="h-4 w-4 shrink-0 text-oxy-text-tertiary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="command-input" class="min-w-0 flex-1 bg-transparent text-sm text-oxy-text outline-none placeholder:text-oxy-text-tertiary" placeholder="Type a command or search..." autocomplete="off" />
            <kbd class="rounded border border-oxy-border/50 px-1.5 py-0.5 text-[10px] font-medium text-oxy-text-tertiary">ESC</kbd>
          </div>
          <div id="command-results" class="max-h-[340px] overflow-y-auto p-1.5">
          </div>
          <div class="flex items-center gap-3 border-t border-oxy-border/40 px-4 py-2 text-[10px] text-oxy-text-tertiary">
            <span class="flex items-center gap-1"><kbd class="rounded border border-oxy-border/40 px-1 py-px">↑↓</kbd> Navigate</span>
            <span class="flex items-center gap-1"><kbd class="rounded border border-oxy-border/40 px-1 py-px">↵</kbd> Go</span>
            <span class="flex items-center gap-1"><kbd class="rounded border border-oxy-border/40 px-1 py-px">esc</kbd> Close</span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
    <script type="module">
      // Live theme color updates via Chrome's native Mojo listener.
      // Same mechanism Chrome NTP uses (app.ts:513).
      try {
        const {ColorChangeUpdater} = await import(
          'chrome://resources/cr_components/color_change_listener/colors_css_updater.js'
        );
        ColorChangeUpdater.forDocument().start();
      } catch {}
    </script>
  </body>
</html>
