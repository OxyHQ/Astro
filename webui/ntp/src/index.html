<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script>
      /* Prevent flash: apply theme before paint */
      (function () {
        const stored = localStorage.getItem("astro-ntp-theme");
        if (
          stored === "dark" ||
          (!stored && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <!-- Ads & Trackers blocked badge -->
    <div class="fixed top-4 left-1/2 -translate-x-1/2 z-50 animate-fade-in">
      <button
        id="blocked-badge"
        type="button"
        class="inline-flex items-center gap-2 rounded-full bg-white/70 dark:bg-black/40 backdrop-blur-xl border border-white/20 dark:border-white/8 px-4 py-2 text-sm font-medium text-oxy-primary hover:bg-white/90 dark:hover:bg-black/60 transition-all shadow-sm cursor-default"
      >
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm-1 15l-4-4 1.41-1.41L11 14.17l6.59-6.59L19 9l-8 8z"/>
        </svg>
        <span id="blocked-count">0 ads and trackers blocked</span>
      </button>
    </div>

    <!-- Wallpaper background layer -->
    <div id="wallpaper-bg" class="default-gradient"></div>

    <!-- Scrollable content -->
    <div
      id="ntp-scroll"
      class="relative z-10 flex min-h-screen flex-col items-center px-6 pb-20 pt-[18vh]"
    >
      <!-- Greeting -->
      <div class="animate-fade-in-up mb-1 text-center">
        <h1
          id="greeting"
          class="wallpaper-text text-[2.5rem] leading-tight font-light tracking-tight text-oxy-text sm:text-[3.25rem]"
        ></h1>
      </div>

      <!-- Clock & Date -->
      <div class="animate-fade-in-up-1 mb-10 text-center">
        <div class="flex items-baseline justify-center gap-3">
          <span
            id="clock"
            class="wallpaper-text-secondary text-lg font-medium tabular-nums text-oxy-text-secondary"
          ></span>
          <span class="wallpaper-text-tertiary text-oxy-text-tertiary"
            >&middot;</span
          >
          <span
            id="date"
            class="wallpaper-text-secondary text-lg font-medium text-oxy-text-secondary"
          ></span>
        </div>
      </div>

      <!-- Search Bar -->
      <form
        id="search-form"
        class="animate-fade-in-up-2 mb-4 w-full max-w-[640px]"
        action="https://duckduckgo.com/"
        method="GET"
      >
        <div
          class="search-container flex items-center gap-3 rounded-2xl border border-white/20 bg-white/70 px-5 py-4 shadow-sm dark:border-white/8 dark:bg-black/40"
        >
          <!-- Search icon -->
          <svg
            class="h-5 w-5 shrink-0 text-oxy-text-tertiary"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>

          <input
            type="text"
            name="q"
            id="search-input"
            class="search-input h-6 min-w-0 flex-1 bg-transparent text-base font-normal text-oxy-text"
            placeholder="Search or ask Alia..."
            autocomplete="off"
            autofocus
          />

          <!-- Alia button -->
          <button
            id="alia-search-btn"
            type="button"
            class="shrink-0 rounded-full bg-oxy-primary/10 px-3.5 py-1.5 text-[13px] font-medium text-oxy-primary transition-colors hover:bg-oxy-primary/20"
          >
            Ask Alia
          </button>

          <!-- Keyboard shortcut hint -->
          <kbd
            id="search-hint"
            class="hidden shrink-0 rounded-md border border-oxy-border bg-oxy-bg px-1.5 py-0.5 text-[11px] font-medium text-oxy-text-tertiary sm:inline-block"
          >
            /
          </kbd>
        </div>
      </form>

      <!-- Quick Action Chips -->
      <div
        class="animate-fade-in-up-3 mb-12 flex flex-wrap items-center justify-center gap-2"
      >
        <a
          href="https://duckduckgo.com/?q=!images"
          class="chip inline-flex items-center gap-1.5 rounded-full border border-white/20 bg-white/50 px-3.5 py-1.5 text-[13px] font-medium text-oxy-text-secondary hover:border-oxy-primary/40 hover:bg-oxy-primary/5 hover:text-oxy-primary dark:border-white/8 dark:bg-white/5"
        >
          <svg
            class="h-3.5 w-3.5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
            <circle cx="9" cy="9" r="2" />
            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
          </svg>
          Images
        </a>
        <a
          href="https://duckduckgo.com/?q=!news"
          class="chip inline-flex items-center gap-1.5 rounded-full border border-white/20 bg-white/50 px-3.5 py-1.5 text-[13px] font-medium text-oxy-text-secondary hover:border-oxy-primary/40 hover:bg-oxy-primary/5 hover:text-oxy-primary dark:border-white/8 dark:bg-white/5"
        >
          <svg
            class="h-3.5 w-3.5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"
            />
            <path d="M18 14h-8" />
            <path d="M15 18h-5" />
            <path d="M10 6h8v4h-8V6Z" />
          </svg>
          News
        </a>
        <a
          href="https://duckduckgo.com/?q=!maps"
          class="chip inline-flex items-center gap-1.5 rounded-full border border-white/20 bg-white/50 px-3.5 py-1.5 text-[13px] font-medium text-oxy-text-secondary hover:border-oxy-primary/40 hover:bg-oxy-primary/5 hover:text-oxy-primary dark:border-white/8 dark:bg-white/5"
        >
          <svg
            class="h-3.5 w-3.5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="m3 7 6-3 6 3 6-3v13l-6 3-6-3-6 3V7Z M9 4v13 M15 7v13"
            />
          </svg>
          Maps
        </a>
        <button
          id="alia-chip"
          type="button"
          class="chip inline-flex items-center gap-1.5 rounded-full border border-oxy-primary/30 bg-oxy-primary/10 px-3.5 py-1.5 text-[13px] font-medium text-oxy-primary hover:border-oxy-primary/60 hover:bg-oxy-primary/20"
        >
          <svg
            class="h-3.5 w-3.5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 6V2H8" />
            <path d="m8 18-4 4V8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2Z" />
            <path d="M2 12h2" />
            <path d="M9 11v2" />
            <path d="M15 11v2" />
            <path d="M20 12h2" />
          </svg>
          Ask Alia
        </button>
      </div>

      <!-- Widget Grid -->
      <div
        id="widget-grid"
        class="animate-fade-in-up-4 mb-8 grid w-full max-w-[900px] grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3"
      >
        <!-- Weather Widget -->
        <div id="weather-widget" class="widget-card">
          <div class="mb-2 flex items-center justify-between">
            <span class="text-xs font-semibold tracking-wide text-oxy-text-tertiary uppercase">Weather</span>
          </div>
          <div id="weather-content">
            <div class="flex items-center gap-3">
              <div class="shimmer h-10 w-10 rounded-xl"></div>
              <div class="flex flex-col gap-1.5">
                <div class="shimmer h-6 w-16 rounded"></div>
                <div class="shimmer h-3.5 w-28 rounded"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Quick Links Widget -->
        <div id="quick-links-widget" class="widget-card">
          <div class="mb-3 flex items-center justify-between">
            <span class="text-xs font-semibold tracking-wide text-oxy-text-tertiary uppercase">Quick Links</span>
            <button
              id="edit-links-btn"
              type="button"
              class="text-xs font-medium text-oxy-primary opacity-0 transition-opacity group-hover:opacity-100 hover:text-oxy-primary-dark"
              style="opacity:1"
            >Edit</button>
          </div>
          <div
            id="quick-links-grid"
            class="grid grid-cols-4 gap-2"
          ></div>
        </div>

        <!-- Notes Widget -->
        <div id="notes-widget" class="widget-card">
          <div class="mb-2 flex items-center justify-between">
            <span class="text-xs font-semibold tracking-wide text-oxy-text-tertiary uppercase">Notes</span>
            <span id="notes-saved" class="text-[10px] font-medium text-oxy-primary opacity-0 transition-opacity">Saved</span>
          </div>
          <textarea
            id="notes-textarea"
            class="notes-textarea"
            placeholder="Jot something down..."
            rows="4"
          ></textarea>
        </div>
      </div>

      <!-- Most Visited Sites -->
      <div
        id="sites-section"
        class="animate-fade-in-up-4 w-full max-w-[900px]"
      >
        <div class="mb-3">
          <span class="text-xs font-semibold tracking-wide text-oxy-text-tertiary uppercase">Frequently Visited</span>
        </div>
        <div
          id="sites-grid"
          class="grid grid-cols-4 gap-3 sm:grid-cols-6 lg:grid-cols-8"
        ></div>
      </div>
    </div>

    <!-- Bottom bar (fixed) -->
    <div
      class="fixed bottom-0 left-0 right-0 z-50 flex items-center justify-between px-5 py-4"
    >
      <!-- Astro branding -->
      <div class="flex items-center gap-2">
        <svg
          class="h-5 w-5"
          viewBox="0 0 163 169"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g
            transform="translate(0,169) scale(0.1,-0.1)"
            fill="#c46ede"
            stroke="none"
          >
            <path
              d="M936 1454 c37 -22 114 -116 114 -139 0 -4 22 -44 49 -89 75 -124 89 -148 112 -191 24 -45 87 -153 207 -357 101 -171 120 -228 102 -293 -17 -62 -61 -120 -110 -145 -91 -47 -434 -36 -566 18 -136 55 -246 148 -315 267 -77 132 -94 192 -93 335 1 141 25 223 107 362 30 51 66 114 81 140 67 119 199 158 312 92z"
            />
            <path
              d="M361 586 c108 -45 154 -170 101 -273 -34 -65 -83 -93 -162 -93 -81 0 -124 21 -165 81 -25 37 -30 54 -30 104 0 50 5 67 30 105 52 76 148 109 226 76z"
            />
          </g>
        </svg>
        <span
          class="text-[11px] font-medium tracking-widest text-oxy-text-tertiary uppercase"
          >Astro</span
        >
      </div>

      <!-- Right-side controls -->
      <div class="flex items-center gap-2">
        <!-- Settings gear -->
        <button
          id="settings-btn"
          type="button"
          class="bottom-btn flex h-8 w-8 items-center justify-center rounded-full text-oxy-text-tertiary hover:bg-white/30 hover:text-oxy-text-secondary dark:hover:bg-white/10"
          aria-label="Settings"
        >
          <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>

        <!-- Theme toggle -->
        <button
          id="theme-toggle"
          type="button"
          class="bottom-btn flex h-8 w-8 items-center justify-center rounded-full text-oxy-text-tertiary hover:bg-white/30 hover:text-oxy-text-secondary dark:hover:bg-white/10"
          aria-label="Toggle dark mode"
        >
          <!-- Sun icon (shown in dark mode) -->
          <svg
            id="icon-sun"
            class="hidden h-4 w-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5" />
            <path
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
            />
          </svg>
          <!-- Moon icon (shown in light mode) -->
          <svg
            id="icon-moon"
            class="h-4 w-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Settings overlay -->
    <div id="settings-overlay" class="settings-overlay"></div>

    <!-- Settings panel -->
    <div id="settings-panel" class="settings-panel">
      <div class="mx-auto max-w-lg px-6 py-6">
        <!-- Drag handle -->
        <div class="mb-6 flex justify-center">
          <div class="h-1 w-10 rounded-full bg-oxy-border"></div>
        </div>

        <h2 class="mb-6 text-lg font-semibold text-oxy-text">Customize</h2>

        <!-- Wallpaper -->
        <div class="mb-6">
          <label class="mb-2 block text-sm font-medium text-oxy-text-secondary">Wallpaper</label>
          <input
            id="wallpaper-input"
            type="text"
            class="settings-input mb-2"
            placeholder="Paste image URL..."
          />
          <div class="flex gap-2">
            <button
              id="wallpaper-unsplash"
              type="button"
              class="rounded-lg bg-oxy-primary/10 px-3 py-1.5 text-xs font-medium text-oxy-primary transition-colors hover:bg-oxy-primary/20"
            >Random from Unsplash</button>
            <button
              id="wallpaper-clear"
              type="button"
              class="rounded-lg bg-white/50 px-3 py-1.5 text-xs font-medium text-oxy-text-secondary transition-colors hover:bg-white/80 dark:bg-white/5 dark:hover:bg-white/10"
            >Clear</button>
          </div>
        </div>

        <!-- Search Engine -->
        <div class="mb-6">
          <label class="mb-2 block text-sm font-medium text-oxy-text-secondary">Search Engine</label>
          <select id="search-engine-select" class="settings-input">
            <option value="duckduckgo">DuckDuckGo</option>
            <option value="google">Google</option>
            <option value="bing">Bing</option>
            <option value="brave">Brave Search</option>
            <option value="startpage">Startpage</option>
          </select>
        </div>

        <!-- Widget toggles -->
        <div class="mb-6">
          <label class="mb-3 block text-sm font-medium text-oxy-text-secondary">Widgets</label>
          <div class="flex flex-col gap-3">
            <div class="flex items-center justify-between">
              <span class="text-sm text-oxy-text">Weather</span>
              <div id="toggle-weather" class="toggle-switch active" data-widget="weather"></div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-oxy-text">Quick Links</span>
              <div id="toggle-quick-links" class="toggle-switch active" data-widget="quick-links"></div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-oxy-text">Notes</span>
              <div id="toggle-notes" class="toggle-switch active" data-widget="notes"></div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-oxy-text">Frequently Visited</span>
              <div id="toggle-sites" class="toggle-switch active" data-widget="sites"></div>
            </div>
          </div>
        </div>

        <!-- Quick Links editor -->
        <div class="mb-6">
          <label class="mb-2 block text-sm font-medium text-oxy-text-secondary">Edit Quick Links</label>
          <div id="quick-links-editor" class="flex flex-col gap-2"></div>
          <button
            id="add-quick-link-btn"
            type="button"
            class="mt-2 w-full rounded-xl border border-dashed border-oxy-border py-2 text-center text-sm font-medium text-oxy-text-tertiary transition-colors hover:border-oxy-primary hover:text-oxy-primary"
          >+ Add Link</button>
        </div>

        <!-- Temperature Unit -->
        <div class="mb-6">
          <label class="mb-2 block text-sm font-medium text-oxy-text-secondary">Temperature Unit</label>
          <div class="flex gap-2">
            <button id="temp-f" type="button" class="rounded-lg bg-oxy-primary/10 px-4 py-1.5 text-sm font-medium text-oxy-primary transition-colors">°F</button>
            <button id="temp-c" type="button" class="rounded-lg bg-white/50 px-4 py-1.5 text-sm font-medium text-oxy-text-secondary transition-colors dark:bg-white/5">°C</button>
          </div>
        </div>

        <div class="h-8"></div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
