<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script>
      (function () {
        const stored = localStorage.getItem("astro-ntp-theme");
        if (
          stored === "dark" ||
          (!stored && matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.setAttribute("data-color-scheme", "dark");
        } else {
          document.documentElement.setAttribute("data-color-scheme", "light");
        }
      })();
    </script>
  </head>
  <body class="bg-base" data-modality="mouse">
    <div id="root">
      <div class="border-subtlest ring-subtlest divide-subtlest bg-base">
        <div class="isolate flex h-dvh">
          <!-- Sidebar -->
          <div
            class="flex size-full flex-1 duration-normal ease-in-out"
            style="transition-property: padding"
          >
            <div
              id="sidebar"
              class="sidebar-width shrink-0 h-full ease-out transform-gpu z-[1] transition-[width] duration-normal"
            >
              <nav
                class="group/sidebar relative z-10 hidden min-h-0 flex-none h-full border-subtlest ring-subtlest divide-subtlest bg-subtle md:flex"
                aria-label="Main"
              >
                <div
                  class="relative size-full overflow-hidden border-subtlest ring-subtlest divide-subtlest flex flex-col"
                >
                  <!-- Sidebar toggle tabs (Search / Discover) -->
                  <div class="flex flex-none flex-col" style="height: 90px">
                    <div
                      class="flex w-full mb-sm items-start pt-sm justify-center"
                    >
                      <div class="w-full relative select-none">
                        <div
                          class="relative"
                          style="
                            width: 184px;
                            margin-left: 8px;
                            margin-right: 8px;
                            padding: 4px;
                          "
                        >
                          <!-- Background track -->
                          <div
                            class="absolute inset-y-0 left-0 transition-all duration-normal ease-out border-subtlest ring-subtlest divide-subtlest bg-subtle rounded-xl"
                            style="width: 184px"
                          ></div>
                          <!-- Active indicator -->
                          <div
                            id="sidebar-active-indicator"
                            class="absolute top-0 transition-all duration-normal ease-out border-subtlest ring-subtlest divide-subtlest bg-raised rounded-lg"
                            style="
                              width: 176px;
                              left: 4px;
                              top: 4px;
                              height: calc(50% - 4px);
                              transform: translateY(0px);
                            "
                          ></div>
                          <div
                            class="flex flex-col gap-two items-start"
                          >
                            <!-- Search tab -->
                            <a
                              id="tab-search"
                              class="group/toggle-item interactable flex items-center justify-start no-underline w-full h-8 shrink-0 relative cursor-pointer transition-colors duration-quick gap-xs sidebar-tab active"
                              href="#"
                            >
                              <div
                                class="flex items-center justify-center shrink-0"
                                style="width: 32px"
                              >
                                <svg
                                  class="inline-flex shrink-0"
                                  width="20"
                                  height="20"
                                  viewBox="0 0 163 169"
                                  fill="currentColor"
                                >
                                  <g
                                    transform="translate(0,169) scale(0.1,-0.1)"
                                    stroke="none"
                                  >
                                    <path
                                      d="M936 1454 c37 -22 114 -116 114 -139 0 -4 22 -44 49 -89 75 -124 89 -148 112 -191 24 -45 87 -153 207 -357 101 -171 120 -228 102 -293 -17 -62 -61 -120 -110 -145 -91 -47 -434 -36 -566 18 -136 55 -246 148 -315 267 -77 132 -94 192 -93 335 1 141 25 223 107 362 30 51 66 114 81 140 67 119 199 158 312 92z"
                                    />
                                    <path
                                      d="M361 586 c108 -45 154 -170 101 -273 -34 -65 -83 -93 -162 -93 -81 0 -124 21 -165 81 -25 37 -30 54 -30 104 0 50 5 67 30 105 52 76 148 109 226 76z"
                                    />
                                  </g>
                                </svg>
                              </div>
                              <div
                                class="transition-opacity duration-quick text-inherit flex-1 delay-100 font-sans text-sm text-foreground"
                              >
                                Search
                              </div>
                            </a>
                            <!-- Discover tab -->
                            <a
                              id="tab-discover"
                              class="group/toggle-item interactable flex items-center justify-start no-underline w-full h-8 shrink-0 relative cursor-pointer transition-colors duration-quick gap-xs sidebar-tab text-quiet hover:text-foreground"
                              href="#"
                            >
                              <div
                                class="flex items-center justify-center shrink-0"
                                style="width: 32px"
                              >
                                <svg
                                  class="inline-flex fill-current shrink-0"
                                  width="20"
                                  height="20"
                                  viewBox="0 0 24 24"
                                  stroke-width="1.75"
                                >
                                  <path
                                    d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Zm-2.34-6.66 1.18-3.16 3.16-1.18-1.18 3.16-3.16 1.18Z"
                                  />
                                </svg>
                              </div>
                              <div
                                class="transition-opacity duration-quick text-inherit flex-1 delay-100 font-sans text-sm"
                              >
                                Discover
                              </div>
                            </a>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Sidebar content area -->
                  <div class="flex-1 overflow-y-auto px-2 pb-2">
                    <!-- Recent threads -->
                    <div class="mb-3">
                      <div
                        class="px-2 py-1.5 text-2xs font-medium text-quiet uppercase tracking-wider"
                      >
                        Recent
                      </div>
                      <div id="sidebar-recent" class="flex flex-col gap-px"></div>
                    </div>
                  </div>

                  <!-- Sidebar bottom -->
                  <div
                    class="flex flex-none flex-col border-t border-subtlest p-2"
                  >
                    <button
                      id="settings-btn"
                      type="button"
                      class="interactable flex items-center gap-xs w-full h-8 rounded-lg px-2 text-quiet hover:text-foreground hover:bg-subtle transition-colors duration-quick"
                    >
                      <svg
                        class="inline-flex fill-current shrink-0"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path
                          d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
                        />
                        <circle cx="12" cy="12" r="3" />
                      </svg>
                      <span class="text-sm">Settings</span>
                    </button>
                    <button
                      id="theme-toggle"
                      type="button"
                      class="interactable flex items-center gap-xs w-full h-8 rounded-lg px-2 text-quiet hover:text-foreground hover:bg-subtle transition-colors duration-quick"
                    >
                      <svg
                        id="icon-sun"
                        class="hidden inline-flex shrink-0"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <circle cx="12" cy="12" r="5" />
                        <path
                          d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
                        />
                      </svg>
                      <svg
                        id="icon-moon"
                        class="inline-flex shrink-0"
                        width="16"
                        height="16"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      >
                        <path
                          d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
                        />
                      </svg>
                      <span class="text-sm">Theme</span>
                    </button>
                  </div>
                </div>
              </nav>
            </div>

            <!-- Main content area -->
            <main
              class="isolate flex h-auto max-h-screen min-w-0 grow flex-col"
            >
              <div
                class="@container/main relative isolate min-h-0 flex-1 overflow-clip bg-clip-border border-subtlest ring-subtlest divide-subtlest bg-base"
              >
                <div class="mx-auto flex w-full flex-col h-full">
                  <div
                    class="scrollable-container flex flex-1 basis-0 overflow-auto [scrollbar-gutter:stable] scrollbar-subtle"
                  >
                    <div class="mx-auto size-full max-w-none">
                      <div class="mx-auto flex size-full flex-col">
                        <!-- Top bar with blocked badge -->
                        <div
                          class="absolute inset-x-0 top-0 z-20 h-14"
                        >
                          <div
                            class="relative mx-auto h-full w-full"
                          >
                            <div
                              class="absolute inset-0 flex items-center justify-center"
                            >
                              <div
                                class="pointer-events-auto relative"
                                style="opacity: 1"
                              >
                                <button
                                  id="blocked-badge"
                                  type="button"
                                  class="border border-subtle text-quiet hover:border-subtle hover:text-quiet hover:bg-subtle bg-base font-sans focus:outline-none outline-none transition duration-300 ease-out select-none items-center relative font-semimedium justify-center text-center rounded-full cursor-pointer active:scale-[0.97] active:duration-150 active:ease-outExpo origin-center whitespace-nowrap inline-flex text-sm h-8 px-2.5"
                                >
                                  <div
                                    class="flex items-center min-w-0 gap-two justify-center"
                                  >
                                    <div
                                      class="flex shrink-0 items-center justify-center size-4"
                                    >
                                      <svg
                                        class="inline-flex fill-current shrink-0 text-super"
                                        width="16"
                                        height="16"
                                        viewBox="0 0 24 24"
                                      >
                                        <path
                                          d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm-1 15l-4-4 1.41-1.41L11 14.17l6.59-6.59L19 9l-8 8z"
                                        />
                                      </svg>
                                    </div>
                                    <div
                                      id="blocked-count"
                                      class="relative truncate text-center mb-0 px-1 leading-loose -mb-px text-super"
                                    >
                                      0 ads and trackers blocked
                                    </div>
                                  </div>
                                </button>
                              </div>
                            </div>
                            <!-- Right side: incognito toggle -->
                            <div
                              class="right-md absolute inset-y-0 right-4 flex items-center"
                            >
                              <div
                                class="hidden h-full items-center md:flex gap-1"
                              ></div>
                            </div>
                          </div>
                        </div>

                        <!-- Main content grid -->
                        <div
                          class="mx-auto flex max-w-[800px] grow flex-col items-center justify-center"
                          style="padding-bottom: 80px"
                        >
                          <div
                            class="relative p-lg flex min-h-full w-full items-center justify-center"
                          >
                            <div
                              class="relative grid grid-cols-[repeat(auto-fill,minmax(160px,1fr))] gap-3"
                              style="width: 800px"
                            >
                              <!-- Search bar (full width) -->
                              <div class="-mb-md col-span-full">
                                <div
                                  class="static w-full md:mt-0 z-10 border-subtlest ring-subtlest divide-subtlest flex flex-col items-center justify-center"
                                >
                                  <div class="mb-md w-full">
                                    <div class="relative">
                                      <div
                                        class="bg-base rounded-2xl"
                                        data-ask-input-container="true"
                                      >
                                        <div
                                          class="relative rounded-2xl border-subtlest ring-subtlest divide-subtlest bg-base"
                                        >
                                          <span class="grow block">
                                            <div
                                              class="relative rounded-2xl"
                                            >
                                              <form
                                                id="search-form"
                                                action="https://duckduckgo.com/"
                                                method="GET"
                                              >
                                                <div
                                                  class="bg-raised dark:bg-subtlest w-full outline-none flex items-center border rounded-2xl duration-75 transition-all border-subtle shadow-sm dark:shadow-md shadow-black/5 px-0 pt-3 pb-3 gap-y-md grid items-center"
                                                >
                                                  <div
                                                    class="px-3 grid-rows-1fr-auto grid grid-cols-[1fr_auto]"
                                                  >
                                                    <div
                                                      class="overflow-hidden relative flex h-full col-start-1 col-end-3 pb-2 ml-2 mt-1"
                                                    >
                                                      <div
                                                        class="w-full"
                                                        style="
                                                          min-height: 3em;
                                                        "
                                                      >
                                                        <input
                                                          type="text"
                                                          name="q"
                                                          id="search-input"
                                                          class="overflow-auto outline-none font-sans resize-none caret-super text-foreground bg-transparent placeholder-quieter placeholder:select-none size-full"
                                                          placeholder="Search or ask Alia..."
                                                          autocomplete="off"
                                                          autofocus
                                                          style="
                                                            user-select: text;
                                                          "
                                                        />
                                                      </div>
                                                    </div>
                                                    <!-- Bottom row: left tools + right actions -->
                                                    <div
                                                      class="gap-sm flex overflow-hidden min-w-0 col-start-1 row-start-2"
                                                    >
                                                      <div
                                                        class="gap-sm flex items-center overflow-hidden min-w-0"
                                                      >
                                                        <!-- Attach button -->
                                                        <button
                                                          type="button"
                                                          class="interactable-alt select-none outline-none font-semimedium transition-[background-color,border-color,transform,color,opacity] duration-300 ease-out font-sans text-center items-center justify-center leading-loose whitespace-nowrap text-quiet h-8 text-sm cursor-pointer origin-center active:scale-[0.97] active:duration-150 inline-flex rounded-full aspect-square p-0 hover:text-foreground hover:bg-quiet"
                                                          aria-label="Attach"
                                                        >
                                                          <svg
                                                            class="inline-flex fill-current shrink-0"
                                                            width="16"
                                                            height="16"
                                                            viewBox="0 0 24 24"
                                                            fill="none"
                                                            stroke="currentColor"
                                                            stroke-width="2"
                                                            stroke-linecap="round"
                                                            stroke-linejoin="round"
                                                          >
                                                            <path
                                                              d="M12 5v14M5 12h14"
                                                            />
                                                          </svg>
                                                        </button>
                                                      </div>
                                                    </div>
                                                    <div
                                                      class="flex items-center justify-self-end gap-sm col-start-2 row-start-2"
                                                    >
                                                      <!-- Model selector -->
                                                      <div
                                                        class="inline-flex -mr-sm"
                                                      >
                                                        <button
                                                          id="search-engine-btn"
                                                          type="button"
                                                          class="interactable select-none outline-none font-semimedium transition-[background-color,border-color,transform,color,opacity] duration-300 ease-out font-sans text-center items-center justify-center leading-loose whitespace-nowrap text-quiet h-8 text-sm cursor-pointer origin-center active:scale-[0.97] active:duration-150 inline-flex rounded-full hover:text-foreground hover:bg-quiet px-3 relative"
                                                        >
                                                          <span
                                                            class="pr-1"
                                                            id="search-engine-label"
                                                            >Engine</span
                                                          >
                                                          <svg
                                                            class="inline-flex fill-current shrink-0"
                                                            width="16"
                                                            height="16"
                                                            viewBox="0 0 24 24"
                                                            fill="none"
                                                            stroke="currentColor"
                                                            stroke-width="2"
                                                          >
                                                            <path
                                                              d="m6 9 6 6 6-6"
                                                            />
                                                          </svg>
                                                        </button>
                                                      </div>
                                                      <!-- Submit button -->
                                                      <button
                                                        id="search-submit"
                                                        type="submit"
                                                        class="interactable select-none outline-none font-semimedium transition-[background-color,border-color,transform,color,opacity] duration-300 ease-out font-sans text-center items-center justify-center leading-loose whitespace-nowrap text-inverse border border-transparent bg-super h-8 text-sm cursor-pointer inline-flex rounded-full aspect-square p-0"
                                                        aria-label="Search"
                                                      >
                                                        <svg
                                                          class="inline-flex fill-current shrink-0"
                                                          width="16"
                                                          height="16"
                                                          viewBox="0 0 24 24"
                                                          fill="none"
                                                          stroke="currentColor"
                                                          stroke-width="2.5"
                                                          stroke-linecap="round"
                                                          stroke-linejoin="round"
                                                        >
                                                          <path
                                                            d="M5 12h14M12 5l7 7-7 7"
                                                          />
                                                        </svg>
                                                      </button>
                                                    </div>
                                                  </div>
                                                </div>
                                              </form>
                                            </div>
                                          </span>
                                        </div>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                              </div>

                              <!-- Weather widget card -->
                              <div
                                id="weather-widget"
                                class="relative isolate col-span-1"
                              >
                                <div
                                  class="relative rounded-xl shadow-[0_1px_2px_0_rgba(0,0,0,0.03)] aspect-[1/1] w-full overflow-hidden !rounded-2xl border-subtlest ring-subtlest divide-subtlest bg-raised"
                                >
                                  <div
                                    class="rounded-inherit pointer-events-none absolute inset-0 z-[1] border border-[black]/5 dark:border-[white]/5"
                                  ></div>
                                  <div
                                    id="weather-content"
                                    class="relative size-full"
                                  >
                                    <!-- Weather loading skeleton -->
                                    <div
                                      class="absolute inset-0 overflow-hidden rounded-xl shadow-md !rounded-2xl"
                                      style="background-color: rgb(31, 132, 205)"
                                    >
                                      <div
                                        class="-inset-xl absolute translate-y-1/4 rounded-[50%] opacity-75"
                                        style="
                                          background-color: rgb(255, 199, 0);
                                        "
                                      ></div>
                                      <div
                                        class="-inset-xl absolute translate-y-[60%] rounded-[50%] opacity-75"
                                        style="
                                          background-color: rgb(255, 129, 58);
                                        "
                                      ></div>
                                      <div
                                        class="rounded-inherit absolute inset-0 overflow-hidden"
                                        style="backdrop-filter: blur(40px)"
                                      ></div>
                                      <div class="absolute inset-0"></div>
                                    </div>
                                    <div
                                      class="gap-sm flex h-full flex-1 flex-col justify-between p-2.5 pb-0 pt-1 drop-shadow-sm relative z-10"
                                      style="zoom: 1"
                                    >
                                      <div
                                        class="flex flex-row items-start justify-between"
                                      >
                                        <div>
                                          <h1
                                            id="weather-temp"
                                            class="font-sans font-bold text-2xl text-white"
                                          >
                                            --
                                          </h1>
                                        </div>
                                        <div
                                          id="weather-icon-display"
                                          class="text-3xl"
                                        ></div>
                                      </div>
                                      <div class="pb-2.5">
                                        <div
                                          id="weather-desc"
                                          class="font-sans text-xs font-normal text-white/80"
                                        ></div>
                                        <div
                                          id="weather-location"
                                          class="font-sans text-2xs font-normal text-white/60"
                                        ></div>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                              </div>

                              <!-- Clock widget card -->
                              <div
                                id="clock-widget"
                                class="relative isolate col-span-1"
                              >
                                <div
                                  class="relative border rounded-xl shadow-[0_1px_2px_0_rgba(0,0,0,0.03)] active:!bg-subtle dark:active:!bg-quiet aspect-[1/1] w-full overflow-hidden !rounded-2xl border-subtlest ring-subtlest divide-subtlest bg-raised"
                                >
                                  <div
                                    class="relative size-full p-2 pb-7 pt-2"
                                  >
                                    <div
                                      class="relative mx-auto aspect-square max-h-full max-w-full flex items-center justify-center"
                                    >
                                      <div class="text-center">
                                        <div
                                          id="clock-time"
                                          class="font-mono text-3xl font-bold text-foreground tabular-nums"
                                        ></div>
                                        <div
                                          id="clock-date"
                                          class="mt-1 font-mono text-xs text-quiet"
                                        ></div>
                                      </div>
                                    </div>
                                  </div>
                                  <div
                                    class="absolute bottom-2 left-0 right-0 text-center"
                                  >
                                    <div
                                      id="clock-day"
                                      class="font-mono text-2xs text-quiet uppercase"
                                    ></div>
                                  </div>
                                </div>
                              </div>

                              <!-- Quick Links widget -->
                              <div
                                id="quick-links-widget"
                                class="relative isolate col-span-1"
                              >
                                <div
                                  class="relative border rounded-xl shadow-[0_1px_2px_0_rgba(0,0,0,0.03)] aspect-[1/1] w-full overflow-hidden !rounded-2xl border-subtlest ring-subtlest divide-subtlest bg-raised"
                                >
                                  <div
                                    class="rounded-inherit pointer-events-none absolute inset-0 z-[1] border border-[black]/5 dark:border-[white]/5"
                                  ></div>
                                  <div
                                    class="flex size-full flex-col p-2.5"
                                    style="zoom: 1"
                                  >
                                    <div
                                      class="flex items-center justify-between mb-1.5"
                                    >
                                      <div
                                        class="font-sans text-2xs font-medium text-quiet uppercase tracking-wider"
                                      >
                                        Quick Links
                                      </div>
                                      <button
                                        id="edit-links-btn"
                                        type="button"
                                        class="font-sans text-2xs font-medium text-super hover:underline cursor-pointer"
                                      >
                                        Edit
                                      </button>
                                    </div>
                                    <div
                                      id="quick-links-grid"
                                      class="grid grid-cols-2 gap-1 flex-1 content-start overflow-hidden"
                                    ></div>
                                  </div>
                                </div>
                              </div>

                              <!-- Notes widget card -->
                              <div
                                id="notes-widget"
                                class="relative isolate col-span-1"
                              >
                                <div
                                  class="relative rounded-xl shadow-[0_1px_2px_0_rgba(0,0,0,0.03)] aspect-[1/1] w-full overflow-hidden !rounded-2xl border-subtlest ring-subtlest divide-subtlest bg-raised"
                                >
                                  <div
                                    class="rounded-inherit pointer-events-none absolute inset-0 z-[1] border border-[black]/5 dark:border-[white]/5"
                                  ></div>
                                  <div
                                    class="relative flex size-full cursor-pointer flex-col"
                                    style="zoom: 1"
                                  >
                                    <div
                                      class="absolute inset-0 bg-[#fef3c7] dark:bg-[#422006]"
                                    ></div>
                                    <textarea
                                      id="notes-textarea"
                                      class="scrollbar-none absolute inset-0 z-[1] resize-none bg-transparent p-4 font-sans text-sm focus:outline-none placeholder-[#eab308] dark:placeholder-[#a16207] text-[#a16207] dark:text-[#fef08a]"
                                      autocorrect="false"
                                      placeholder="New note..."
                                      style="
                                        mask-image: linear-gradient(
                                          to top,
                                          rgba(0, 0, 0, 0) 0%,
                                          rgb(0, 0, 0) 16px,
                                          rgb(0, 0, 0) calc(100% - 16px),
                                          rgba(0, 0, 0, 0) 100%
                                        );
                                      "
                                    ></textarea>
                                  </div>
                                </div>
                              </div>

                              <!-- Discover / News card (with background image) -->
                              <div
                                id="discover-widget"
                                class="relative isolate col-span-1"
                              >
                                <div
                                  class="relative rounded-xl shadow-[0_1px_2px_0_rgba(0,0,0,0.03)] aspect-[1/1] w-full overflow-hidden !rounded-2xl border-subtlest ring-subtlest divide-subtlest bg-raised"
                                >
                                  <div
                                    class="rounded-inherit pointer-events-none absolute inset-0 z-[1] border border-[black]/5 dark:border-[white]/5"
                                  ></div>
                                  <a
                                    id="discover-link"
                                    class="block"
                                    href="#"
                                  >
                                    <div
                                      class="absolute inset-0 select-none"
                                    >
                                      <div
                                        class="size-full transform-gpu rounded-2xl"
                                      >
                                        <div
                                          class="gap-sm flex h-full flex-1 flex-col justify-between p-2.5 pb-0"
                                          style="zoom: 1"
                                        >
                                          <div class="absolute inset-0" style="background: linear-gradient(135deg, #1a1033 0%, #2d1b4e 50%, #c46ede 100%)"></div>
                                          <img
                                            id="discover-img"
                                            alt=""
                                            class="absolute inset-0 size-full object-cover"
                                            src=""
                                          />
                                          <div
                                            class="absolute inset-0 bg-black/50"
                                          ></div>
                                          <div
                                            class="absolute inset-0 bg-black"
                                            style="
                                              mask-image: linear-gradient(
                                                transparent 50%,
                                                black
                                              );
                                            "
                                          ></div>
                                          <div
                                            class="absolute inset-0 flex flex-col items-start justify-end gap-1 p-2 drop-shadow-md"
                                          >
                                            <div
                                              id="discover-time"
                                              class="opacity-60 font-sans text-2xs font-normal text-white"
                                            ></div>
                                            <div
                                              id="discover-title"
                                              class="w-full font-sans text-sm font-medium text-white break-words"
                                            >
                                              Trending stories
                                            </div>
                                          </div>
                                        </div>
                                      </div>
                                    </div>
                                  </a>
                                </div>
                              </div>

                              <!-- Alia quick prompt card -->
                              <div
                                id="alia-widget"
                                class="relative isolate col-span-1"
                              >
                                <div
                                  class="relative border rounded-xl shadow-[0_1px_2px_0_rgba(0,0,0,0.03)] aspect-[1/1] w-full cursor-pointer select-none overflow-hidden !rounded-2xl border-subtlest ring-subtlest divide-subtlest bg-raised"
                                >
                                  <div class="size-full">
                                    <div
                                      class="hover:bg-subtle dark:hover:bg-quiet size-full transition duration-300 border-subtlest ring-subtlest divide-subtlest bg-raised"
                                    >
                                      <div
                                        class="flex size-full flex-col p-3"
                                        style="zoom: 1"
                                      >
                                        <div
                                          class="flex items-center gap-2"
                                        >
                                          <div
                                            class="font-sans text-base text-super"
                                          >
                                            <svg
                                              class="inline-flex fill-current shrink-0"
                                              width="24"
                                              height="24"
                                              viewBox="0 0 24 24"
                                              fill="none"
                                              stroke="currentColor"
                                              stroke-width="2"
                                              stroke-linecap="round"
                                              stroke-linejoin="round"
                                            >
                                              <path
                                                d="M12 6V2H8"
                                              />
                                              <path
                                                d="m8 18-4 4V8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2Z"
                                              />
                                              <path d="M2 12h2" />
                                              <path d="M9 11v2" />
                                              <path d="M15 11v2" />
                                              <path d="M20 12h2" />
                                            </svg>
                                          </div>
                                          <div
                                            class="font-sans text-xs font-normal text-quiet break-words line-clamp-2"
                                          >
                                            /ask-alia
                                          </div>
                                        </div>
                                        <div
                                          id="alia-prompt-text"
                                          class="mt-auto font-sans text-sm font-medium text-foreground text-balance break-words line-clamp-5"
                                        >
                                          Ask Alia anything about the web,
                                          code, or ideas
                                        </div>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                              </div>

                              <!-- Most visited sites cards (dynamically populated) -->
                              <div id="sites-container" style="display: contents"></div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </main>
          </div>
        </div>
      </div>
    </div>

    <!-- Settings overlay -->
    <div id="settings-overlay" class="settings-overlay"></div>

    <!-- Settings panel -->
    <div id="settings-panel" class="settings-panel">
      <div class="mx-auto max-w-lg px-6 py-6">
        <!-- Drag handle -->
        <div class="mb-6 flex justify-center">
          <div class="h-1 w-10 rounded-full bg-subtlest"></div>
        </div>

        <h2 class="mb-6 text-lg font-semibold text-foreground">Customize</h2>

        <!-- Wallpaper -->
        <div class="mb-6">
          <label class="mb-2 block text-sm font-medium text-quiet"
            >Wallpaper</label
          >
          <input
            id="wallpaper-input"
            type="text"
            class="settings-input mb-2"
            placeholder="Paste image URL..."
          />
          <div class="flex gap-2">
            <button
              id="wallpaper-unsplash"
              type="button"
              class="rounded-lg bg-super/10 px-3 py-1.5 text-xs font-medium text-super transition-colors hover:bg-super/20"
            >
              Random from Unsplash
            </button>
            <button
              id="wallpaper-clear"
              type="button"
              class="rounded-lg bg-subtle px-3 py-1.5 text-xs font-medium text-quiet transition-colors hover:bg-quiet"
            >
              Clear
            </button>
          </div>
        </div>

        <!-- Search Engine -->
        <div class="mb-6">
          <label class="mb-2 block text-sm font-medium text-quiet"
            >Search Engine</label
          >
          <select id="search-engine-select" class="settings-input">
            <option value="duckduckgo">DuckDuckGo</option>
            <option value="google">Google</option>
            <option value="bing">Bing</option>
            <option value="brave">Brave Search</option>
            <option value="startpage">Startpage</option>
          </select>
        </div>

        <!-- Widget toggles -->
        <div class="mb-6">
          <label class="mb-3 block text-sm font-medium text-quiet"
            >Widgets</label
          >
          <div class="flex flex-col gap-3">
            <div class="flex items-center justify-between">
              <span class="text-sm text-foreground">Weather</span>
              <div
                id="toggle-weather"
                class="toggle-switch active"
                data-widget="weather"
              ></div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-foreground">Clock</span>
              <div
                id="toggle-clock"
                class="toggle-switch active"
                data-widget="clock"
              ></div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-foreground">Quick Links</span>
              <div
                id="toggle-quick-links"
                class="toggle-switch active"
                data-widget="quick-links"
              ></div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-foreground">Notes</span>
              <div
                id="toggle-notes"
                class="toggle-switch active"
                data-widget="notes"
              ></div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-foreground">Discover</span>
              <div
                id="toggle-discover"
                class="toggle-switch active"
                data-widget="discover"
              ></div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-foreground">Ask Alia</span>
              <div
                id="toggle-alia"
                class="toggle-switch active"
                data-widget="alia"
              ></div>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-sm text-foreground">Frequently Visited</span>
              <div
                id="toggle-sites"
                class="toggle-switch active"
                data-widget="sites"
              ></div>
            </div>
          </div>
        </div>

        <!-- Quick Links editor -->
        <div class="mb-6">
          <label class="mb-2 block text-sm font-medium text-quiet"
            >Edit Quick Links</label
          >
          <div id="quick-links-editor" class="flex flex-col gap-2"></div>
          <button
            id="add-quick-link-btn"
            type="button"
            class="mt-2 w-full rounded-xl border border-dashed border-subtlest py-2 text-center text-sm font-medium text-quiet transition-colors hover:border-super hover:text-super"
          >
            + Add Link
          </button>
        </div>

        <!-- Temperature Unit -->
        <div class="mb-6">
          <label class="mb-2 block text-sm font-medium text-quiet"
            >Temperature Unit</label
          >
          <div class="flex gap-2">
            <button
              id="temp-f"
              type="button"
              class="rounded-lg bg-super/10 px-4 py-1.5 text-sm font-medium text-super transition-colors"
            >
              F
            </button>
            <button
              id="temp-c"
              type="button"
              class="rounded-lg bg-subtle px-4 py-1.5 text-sm font-medium text-quiet transition-colors"
            >
              C
            </button>
          </div>
        </div>

        <div class="h-8"></div>
      </div>
    </div>

    <!-- Search engine dropdown -->
    <div
      id="engine-dropdown"
      class="engine-dropdown hidden"
    >
      <button data-engine="duckduckgo" class="engine-option">DuckDuckGo</button>
      <button data-engine="google" class="engine-option">Google</button>
      <button data-engine="bing" class="engine-option">Bing</button>
      <button data-engine="brave" class="engine-option">Brave Search</button>
      <button data-engine="startpage" class="engine-option">Startpage</button>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
