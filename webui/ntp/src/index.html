<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main
      id="ntp"
      class="flex h-screen w-screen flex-col items-center justify-center px-6"
    >
      <!-- Time & Date -->
      <div id="clock-container" class="animate-fade-in mb-8 text-center">
        <div
          id="clock"
          class="text-7xl font-light tracking-tight text-oxy-text"
        ></div>
        <div
          id="date"
          class="mt-2 text-base font-medium tracking-wide text-oxy-text-secondary"
        ></div>
      </div>

      <!-- Astro Logo -->
      <div class="animate-fade-in-delay-1 mb-6 flex justify-center">
        <svg
          class="h-12 w-12"
          viewBox="0 0 163 169"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g
            transform="translate(0,169) scale(0.1,-0.1)"
            fill="#c46ede"
            stroke="none"
          >
            <path
              d="M936 1454 c37 -22 114 -116 114 -139 0 -4 22 -44 49 -89 75 -124 89 -148 112 -191 24 -45 87 -153 207 -357 101 -171 120 -228 102 -293 -17 -62 -61 -120 -110 -145 -91 -47 -434 -36 -566 18 -136 55 -246 148 -315 267 -77 132 -94 192 -93 335 1 141 25 223 107 362 30 51 66 114 81 140 67 119 199 158 312 92z"
            />
            <path
              d="M361 586 c108 -45 154 -170 101 -273 -34 -65 -83 -93 -162 -93 -81 0 -124 21 -165 81 -25 37 -30 54 -30 104 0 50 5 67 30 105 52 76 148 109 226 76z"
            />
          </g>
        </svg>
      </div>

      <!-- Search Bar -->
      <form
        id="search-form"
        class="animate-fade-in-delay-1 mb-10 w-full max-w-xl"
        action="https://duckduckgo.com/"
        method="GET"
      >
        <div class="relative">
          <svg
            class="pointer-events-none absolute top-1/2 left-4 h-5 w-5 -translate-y-1/2 text-oxy-text-secondary"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          <input
            type="text"
            name="q"
            class="search-input h-12 w-full rounded-full border border-oxy-border bg-oxy-surface py-3 pr-4 pl-12 text-base text-oxy-text shadow-sm transition-shadow placeholder:text-oxy-text-secondary/60 hover:shadow-md"
            placeholder="Search with DuckDuckGo"
            autocomplete="off"
            autofocus
          />
        </div>
      </form>

      <!-- Most Visited Sites -->
      <div
        id="sites-grid"
        class="animate-fade-in-delay-2 grid grid-cols-4 gap-4 sm:grid-cols-6 md:grid-cols-8"
      ></div>

      <!-- Branding -->
      <div
        class="animate-fade-in-delay-3 fixed bottom-5 left-1/2 -translate-x-1/2"
      >
        <span
          class="text-xs font-medium tracking-widest text-oxy-text-secondary/40 uppercase"
          >Astro by Oxy</span
        >
      </div>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
