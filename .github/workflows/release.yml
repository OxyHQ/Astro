# Astro Browser - Release Build Pipeline
# Builds installers for Linux, Windows, macOS, and Android
#
# Trigger: push a version tag (v0.1.0, v1.0.0, etc.) or manual dispatch
#
# Requirements: Self-hosted runners with persistent Chromium checkout.
# Each runner needs ~200GB disk, 32GB+ RAM, and the "chromium" label.
# Chromium source persists between runs in $GITHUB_WORKSPACE/chromium/
#
# Runner labels:
#   [self-hosted, chromium, linux]   - Linux x64 builds + Android cross-compile
#   [self-hosted, chromium, windows] - Windows x64 builds
#   [self-hosted, chromium, macos]   - macOS arm64 builds
#
# Optional secrets for code signing:
#   MACOS_CERTIFICATE_P12       - Base64-encoded .p12 certificate
#   MACOS_CERTIFICATE_PASSWORD  - Certificate password
#   MACOS_NOTARY_APPLE_ID       - Apple ID for notarization
#   MACOS_NOTARY_PASSWORD       - App-specific password
#   MACOS_NOTARY_TEAM_ID        - Apple Developer Team ID
#   WINDOWS_SIGN_CERT           - Base64-encoded .pfx certificate
#   WINDOWS_SIGN_PASSWORD       - Certificate password
#   ANDROID_KEYSTORE            - Base64-encoded .jks keystore
#   ANDROID_KEYSTORE_PASSWORD   - Keystore password
#   ANDROID_KEY_ALIAS           - Key alias
#   ANDROID_KEY_PASSWORD        - Key password

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g., 0.2.0). Defaults to VERSION file."
        required: false

permissions:
  contents: write

env:
  CHROMIUM_VERSION: "146.0.7680.177"

jobs:
  # ---------------------------------------------------------------------------
  # Linux x64
  # ---------------------------------------------------------------------------
  linux:
    name: Linux x64
    runs-on: [self-hosted, chromium, linux]
    timeout-minutes: 360
    steps:
      - name: Checkout Astro
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Fetch Chromium (skip if cached)
        run: |
          if [ ! -d "chromium/src/.git" ]; then
            tools/fetch-chromium.sh
          else
            echo "Chromium source cached, skipping fetch"
          fi

      - name: Sync ungoogled patches
        run: tools/sync-ungoogled.sh

      - name: Reset and apply patches
        run: |
          cd chromium/src
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          cd ../..
          tools/apply-patches.sh all

      - name: Build WebUI
        run: |
          for page in ntp alia settings whats-new error; do
            if [ -f "webui/$page/package.json" ]; then
              cd "webui/$page"
              bun install --frozen-lockfile
              bun run build
              sed -i 's/ crossorigin//g' dist/index.html 2>/dev/null || true
              cd ../..
            fi
          done

      - name: Build Astro (Linux)
        run: tools/build.sh Release linux

      - name: Package tar.gz
        run: tools/package-linux.sh
        env:
          ASTRO_VERSION: ${{ steps.version.outputs.version }}

      - name: Package .deb
        run: tools/package-deb.sh
        env:
          ASTRO_VERSION: ${{ steps.version.outputs.version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: astro-linux-x64
          path: |
            releases/astro-*-linux-x64.tar.gz
            releases/astro-browser_*.deb
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Windows x64
  # ---------------------------------------------------------------------------
  windows-x64:
    name: Windows x64
    runs-on: [self-hosted, chromium, windows]
    timeout-minutes: 480
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
    steps:
      - name: Checkout Astro
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Fetch Chromium (skip if cached)
        shell: bash
        run: |
          if [ ! -d "chromium/src/.git" ]; then
            tools/fetch-chromium.sh
          else
            echo "Chromium source cached, skipping fetch"
          fi

      - name: Sync ungoogled patches
        shell: bash
        run: tools/sync-ungoogled.sh

      - name: Reset and apply patches
        shell: bash
        run: |
          cd chromium/src
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          cd ../..
          tools/apply-patches.sh all

      - name: Build WebUI
        shell: bash
        run: |
          for page in ntp alia settings whats-new error; do
            if [ -f "webui/$page/package.json" ]; then
              cd "webui/$page"
              bun install --frozen-lockfile
              bun run build
              cd ../..
            fi
          done

      - name: Build Astro (Windows x64)
        shell: bash
        run: tools/build.sh Release windows

      - name: Sign (optional)
        if: env.WINDOWS_SIGN_CERT != ''
        shell: powershell
        env:
          WINDOWS_SIGN_CERT: ${{ secrets.WINDOWS_SIGN_CERT }}
          WINDOWS_SIGN_PASSWORD: ${{ secrets.WINDOWS_SIGN_PASSWORD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_SIGN_CERT)
          [IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          & signtool sign /f cert.pfx /p $env:WINDOWS_SIGN_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 chromium/src/out/Release/mini_installer.exe
          Remove-Item cert.pfx

      - name: Package
        shell: bash
        run: tools/package-windows.sh
        env:
          ASTRO_VERSION: ${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-windows-x64
          path: releases/astro-*-windows-x64*
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Windows ARM64 (built on Windows x64, cross-compiled)
  # ---------------------------------------------------------------------------
  windows-arm64:
    name: Windows ARM64
    runs-on: [self-hosted, chromium, windows]
    timeout-minutes: 480
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"
    steps:
      - name: Checkout Astro
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Fetch Chromium (skip if cached)
        shell: bash
        run: |
          if [ ! -d "chromium/src/.git" ]; then
            tools/fetch-chromium.sh
          else
            echo "Chromium source cached, skipping fetch"
          fi

      - name: Sync ungoogled patches
        shell: bash
        run: tools/sync-ungoogled.sh

      - name: Reset and apply patches
        shell: bash
        run: |
          cd chromium/src
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          cd ../..
          tools/apply-patches.sh all

      - name: Build WebUI
        shell: bash
        run: |
          for page in ntp alia settings whats-new error; do
            if [ -f "webui/$page/package.json" ]; then
              cd "webui/$page"
              bun install --frozen-lockfile
              bun run build
              cd ../..
            fi
          done

      - name: Build Astro (Windows ARM64)
        shell: bash
        run: tools/build.sh Release windows-arm64

      - name: Sign (optional)
        if: env.WINDOWS_SIGN_CERT != ''
        shell: powershell
        env:
          WINDOWS_SIGN_CERT: ${{ secrets.WINDOWS_SIGN_CERT }}
          WINDOWS_SIGN_PASSWORD: ${{ secrets.WINDOWS_SIGN_PASSWORD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_SIGN_CERT)
          [IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          & signtool sign /f cert.pfx /p $env:WINDOWS_SIGN_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 chromium/src/out/Release/mini_installer.exe
          Remove-Item cert.pfx

      - name: Package
        shell: bash
        run: |
          ASTRO_VERSION="${{ steps.version.outputs.version }}" \
          ASTRO_ARCH="arm64" \
          tools/package-windows.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-windows-arm64
          path: releases/astro-*-windows-arm64*
          retention-days: 7

  # ---------------------------------------------------------------------------
  # macOS arm64 (Apple Silicon)
  # ---------------------------------------------------------------------------
  macos:
    name: macOS arm64
    runs-on: [self-hosted, chromium, macos]
    timeout-minutes: 480
    steps:
      - name: Checkout Astro
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Fetch Chromium (skip if cached)
        run: |
          if [ ! -d "chromium/src/.git" ]; then
            tools/fetch-chromium.sh
          else
            echo "Chromium source cached, skipping fetch"
          fi

      - name: Sync ungoogled patches
        run: tools/sync-ungoogled.sh

      - name: Reset and apply patches
        run: |
          cd chromium/src
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          cd ../..
          tools/apply-patches.sh all

      - name: Build WebUI
        run: |
          for page in ntp alia settings whats-new error; do
            if [ -f "webui/$page/package.json" ]; then
              cd "webui/$page"
              bun install --frozen-lockfile
              bun run build
              sed -i '' 's/ crossorigin//g' dist/index.html 2>/dev/null || true
              cd ../..
            fi
          done

      - name: Build Astro (macOS)
        run: tools/build.sh Release macos

      - name: Package and sign
        run: tools/package-macos.sh
        env:
          ASTRO_VERSION: ${{ steps.version.outputs.version }}
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-macos-arm64
          path: releases/astro-*-macos-arm64.dmg
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Android arm64 (cross-compiled on Linux)
  # ---------------------------------------------------------------------------
  android:
    name: Android arm64
    runs-on: [self-hosted, chromium, linux]
    timeout-minutes: 360
    steps:
      - name: Checkout Astro
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Fetch Chromium (skip if cached)
        run: |
          if [ ! -d "chromium/src/.git" ]; then
            CHROMIUM_VERSION=${{ env.CHROMIUM_VERSION }} tools/fetch-chromium.sh
          else
            echo "Chromium source cached, skipping fetch"
          fi

      - name: Install Android dependencies
        run: |
          cd chromium/src
          build/install-build-deps-android.sh

      - name: Sync ungoogled patches
        run: tools/sync-ungoogled.sh

      - name: Reset and apply patches
        run: |
          cd chromium/src
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          cd ../..
          tools/apply-patches.sh all

      - name: Build WebUI
        run: |
          for page in ntp alia settings whats-new error; do
            if [ -f "webui/$page/package.json" ]; then
              cd "webui/$page"
              bun install --frozen-lockfile
              bun run build
              sed -i 's/ crossorigin//g' dist/index.html 2>/dev/null || true
              cd ../..
            fi
          done

      - name: Build Astro (Android)
        run: tools/build.sh Release android

      - name: Package and sign
        run: tools/package-android.sh
        env:
          ASTRO_VERSION: ${{ steps.version.outputs.version }}
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-android-arm64
          path: releases/astro-*-android-arm64.apk
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [linux, windows-x64, windows-arm64, macos, android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for VERSION file)
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Astro v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/astro-linux-x64/*
            artifacts/astro-windows-x64/*
            artifacts/astro-windows-arm64/*
            artifacts/astro-macos-arm64/*
            artifacts/astro-android-arm64/*
          body: |
            ## Astro v${{ steps.version.outputs.version }}

            De-Googled Chromium browser by [Oxy](https://oxy.so), with built-in ad blocker and privacy-first design.

            Based on Chromium ${{ env.CHROMIUM_VERSION }}.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Linux x64 (.tar.gz) | `astro-${{ steps.version.outputs.version }}-linux-x64.tar.gz` |
            | Linux x64 (.deb) | `astro-browser_${{ steps.version.outputs.version }}_amd64.deb` |
            | Windows x64 | `astro-${{ steps.version.outputs.version }}-windows-x64-installer.exe` |
            | Windows ARM64 | `astro-${{ steps.version.outputs.version }}-windows-arm64-installer.exe` |
            | macOS arm64 | `astro-${{ steps.version.outputs.version }}-macos-arm64.dmg` |
            | Android arm64 | `astro-${{ steps.version.outputs.version }}-android-arm64.apk` |

            ### Installation

            **Linux (deb):** `sudo apt install ./astro-browser_VERSION_amd64.deb`

            **Linux (tar.gz):** Extract and run `./astro/install.sh`, or use `./astro/chrome` directly.

            **Windows:** Run the installer `.exe`.

            **macOS:** Open the `.dmg` and drag Astro to Applications.

            **Android:** Enable "Install from unknown sources" and install the `.apk`.
